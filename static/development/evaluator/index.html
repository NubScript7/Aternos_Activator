<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Eval Runner</title>

    <link rel="stylesheet" href="./evaluator/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
    
    <div class="container">
        <div class="container-fluid p-3">

            <!-- title -->
            <div class="card">
                <div class="card-body">
                    <h1 class="text-center">Aternos Custom Script Browser Evaluator</h1>
                </div>
            </div>

            <!-- script editor -->
            <div class="card my-3">

                <div class="card-body p-2">
                    <textarea id="user-script" class="form-control my-2" placeholder="create a script..."></textarea>


                    <div class="container my-3">

                        <button id="clear-code" class="btn btn-secondary">Clear</button>
                        <button id="eval-code" class="btn btn-primary">Evaluate</button>
                        

                    </div>


                </div>

            </div>

            <!-- script logs -->

            <div class="card">
                <div class="card-body">

                    <!-- logs title -->
                    <div class="card">
                        <div class="card-body">
                            <h2 class="text-center">Script Logs</h2>
                        </div>
                    </div>

                    <!-- logs container -->

                    <div class="card my-3">
                        <div class="card-body">

                            <textarea id="output-logs" class="form-control" readonly></textarea>

                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <script src="./evaluator/main.js"></script>
</body>
</html>
